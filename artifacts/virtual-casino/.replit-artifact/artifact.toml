kind = "web"
previewPath = "/"
title = "Virtual Casino"
version = "1.0.0"
id = "artifacts/virtual-casino"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25710

[services.development]
run = "pnpm --filter @workspace/virtual-casino run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/virtual-casino", "run", "build" ]
publicDir = "artifacts/virtual-casino/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25710"
BASE_PATH = "/"
